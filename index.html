<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Menu</title>
    <!-- <meta property="og:image" content="https://bolt.new/static/og_default.png" /> -->
    <meta name="twitter:card" content="summary_large_image" />
    <!-- <meta name="twitter:image" content="https://bolt.new/static/og_default.png" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="restaurant-name">La Cucina Bella</h1>
        <p class="restaurant-tagline">Where Every Meal Tells a Story</p>
      </div>
    </section>

  <div id="menuContainer"></div>

    <!-- Floating Menu Button -->
    <button class="floating-menu-btn" id="menuBtn" aria-label="Open menu">   
  <span class="menu-icon">🍴</span>
  <span class="menu-text">Menu</span>
    </button>

    <!-- Slide-up Menu Panel -->
    <div class="menu-panel" id="menuPanel">
      <div class="drag-indicator"></div>

      <!-- Menu Selection View -->
      <div class="panel-view" id="menuSelectionView">
        <h3 class="panel-title">Select Menu</h3>
        <nav class="menu-list">
          <button class="menu-item" data-menu="beverage">
            <span class="menu-item-icon">🥤</span>
            <span class="menu-item-label">Beverage Menu</span>
          </button>
          <button class="menu-item" data-menu="barbeque">
            <span class="menu-item-icon">🔥</span>
            <span class="menu-item-label">Barbeque Bay Menu</span>
          </button>
          <button class="menu-item" data-menu="roomservice">
            <span class="menu-item-icon">🚪</span>
            <span class="menu-item-label">Room Service Menu</span>
          </button>
        </nav>
      </div>

      <!-- Categories View -->
      <div class="panel-view" id="categoriesView" style="display: none;">
        <button class="back-btn" id="backBtn">← Back</button>
        <h3 class="panel-title" id="menuTitle">Beverage Menu</h3>
        <nav class="category-list" id="categoryList">
          <!-- Categories will be populated by JavaScript -->
        </nav>
      </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
